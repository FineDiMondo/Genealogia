name: "GENBLD00 - MVS Batch Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "mvs/**"
      - ".github/workflows/GENBLD00.yml"
  workflow_dispatch:

jobs:
  GENBLD00:
    runs-on: ubuntu-latest
    steps:
      - name: "STEP000 - Checkout"
        uses: actions/checkout@v4

      - name: "STEP001 - Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "STEP002 - Install requirements"
        run: pip install -r mvs/requirements.txt

      - name: "STEP010 - EXEC PGM=GENVAL00 (pre-import)"
        run: python mvs/proc/GENVAL00.py

      - name: "STEP005 - EXEC PGM=GENGED01 (GEDCOM -> DAT)"
        run: python mvs/proc/GENGED01.py

      - name: "STEP015 - EXEC PGM=GENVAL00 (post-import)"
        run: python mvs/proc/GENVAL00.py

      - name: "STEP020 - EXEC PGM=GENRPT00 (DAT -> JSON)"
        run: python mvs/proc/GENRPT00.py

      - name: "STEP030 - Upload MVS artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: mvs-out-current
          path: mvs/out/current/
