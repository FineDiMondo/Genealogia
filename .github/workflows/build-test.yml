name: Test Build (Develop)

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PWA dependencies
        working-directory: app
        run: |
          npm ci || npm install

      - name: Lint & Format Check
        working-directory: app
        run: |
          npm run lint --if-present
          npm run format --if-present
        continue-on-error: true

      - name: Astro Build
        working-directory: app
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Syntax Check GIARDINA batch.py
        run: |
          python3 -m py_compile GIARDINA/03_PROG/batch.py
          echo "batch.py syntax OK"

      - name: Verify Directory Structure
        run: |
          test -d GIARDINA/02_DATA/RECORDS && echo "RECORDS dir exists"
          test -d GIARDINA/03_PROG && echo "PROG dir exists"
          test -d app/src/pages && echo "Pages dir exists"
          test -f .github/workflows/pages-astro.yml && echo "pages-astro.yml exists"

