name: Deploy Astro PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "pages-astro"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: app
        run: |
          npm ci || npm install

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Verify GIARDINA Pipeline
        run: |
          python3 -m py_compile GIARDINA/03_PROG/batch.py

      - name: Run filesystem jobs
        run: bash jobs/run_job.sh

      - name: Build Astro app
        working-directory: app
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Ensure Pages source is gh-pages
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const source = { branch: 'gh-pages', path: '/' };
            try {
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                source
              });
              core.info('Created GitHub Pages site with gh-pages source.');
            } catch (err) {
              if ([409, 422].includes(err.status)) {
                await github.request('PUT /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  source
                });
                core.info('Updated GitHub Pages source to gh-pages.');
              } else {
                throw err;
              }
            }
