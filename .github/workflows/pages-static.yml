name: pages-static

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-static"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Optional static batch build
        run: |
          if [ -f "jobs/run_job.sh" ]; then
            bash jobs/run_job.sh
          fi

      - name: Prepare static 370 artifact
        run: |
          rm -rf _pages_root
          mkdir -p _pages_root

          if [ -d "PORTALE_GN" ]; then
            cp -R PORTALE_GN/. _pages_root/
            echo "DEPLOY_SOURCE=PORTALE_GN" >> $GITHUB_ENV
          elif [ -d "out/current/site" ]; then
            cp -R out/current/site/. _pages_root/
            echo "DEPLOY_SOURCE=out/current/site" >> $GITHUB_ENV
          else
            mkdir -p out/current/site
            cp index.html out/current/site/index.html
            if [ -d "assets" ]; then cp -R assets out/current/site/assets; fi
            if [ -d "src" ]; then cp -R src out/current/site/src; fi
            if [ -f "version.json" ]; then cp version.json out/current/site/version.json; fi
            if [ -f "service-worker.js" ]; then cp service-worker.js out/current/site/service-worker.js; fi
            cp -R out/current/site/. _pages_root/
            echo "DEPLOY_SOURCE=out/current/site (generated fallback)" >> $GITHUB_ENV
          fi

          # Ensure GN370 runtime data/copybooks are always available on Pages.
          if [ -d "data/current" ]; then
            mkdir -p _pages_root/data
            cp -R data/current _pages_root/data/current
          fi
          if [ -d "copybooks" ]; then
            cp -R copybooks _pages_root/copybooks
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages_root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
