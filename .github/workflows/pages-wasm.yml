name: pages-wasm

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare GN370 shell artifact
        run: |
          mkdir -p engine_scummlike_web/dist
          cp index.html engine_scummlike_web/dist/index.html
          cp -r assets engine_scummlike_web/dist/assets
          cp -r data engine_scummlike_web/dist/data
          cp -r tests engine_scummlike_web/dist/tests
          cp -r docs engine_scummlike_web/dist/docs
          cp -r mvs engine_scummlike_web/dist/mvs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: engine_scummlike_web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
