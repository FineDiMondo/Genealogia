name: tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run JavaScript tests
        run: npm test

  all-tests-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate COBOL fixtures
        run: npm run test:cobol:fixtures
      - name: Run full test suite (JS + conditional COBOL)
        run: npm run test:all
