name: Validate and Build Portale Giardina

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Validate records
        run: make validate

      - name: Build site
        run: make build

      - name: Test
        run: make test
