name: GN370 - Boot Invariants + Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static analysis - pattern vietati
        run: bash scripts/static_analysis.sh
      - name: Copybook coherence check
        run: bash scripts/check_copybooks.sh

  verify-boot:
    runs-on: ubuntu-latest
    needs: static-analysis
    strategy:
      matrix:
        env: [dev, test, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - name: Setup environment ${{ matrix.env }}
        run: bash environments/setup-env.sh ${{ matrix.env }}
      - name: Verify deployment structure
        run: bash scripts/verify_deployment.sh
      - name: Boot invariant tests (Playwright)
        run: npx playwright test tests/boot_invariants.test.js
        env:
          GN370_TEST_URL: http://localhost:8080
      - name: Gate tests
        run: node tests/gate_tests.js
      - name: GEDCOM import tests
        run: npx playwright test tests/gedcom_import.test.js
      - name: Herald import tests
        run: npx playwright test tests/herald_import.test.js
      - name: Export + roundtrip tests
        run: npx playwright test tests/export_tests.js tests/svg_tree.test.js
      - name: Multi-env tests
        run: bash tests/multienv_tests.sh
