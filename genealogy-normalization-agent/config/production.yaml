server:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 30

database:
  type: postgresql
  host: ${DB_HOST}
  port: 5432
  name: genealogy_norm
  ssl: true

logging:
  level: INFO
  format: json
  file: /var/log/genealogy-norm.log
  rotation: daily
  retention_days: 30

giardina:
  input_dir: data/incoming
  output_dir: data/normalized
  audit_dir: data/normalized
  status_dir: data/normalized
  monitoring: true
  retry_attempts: 3

gestionale:
  pending_dir: data/gestionale/pending
  response_dir: data/gestionale/responses
  archive_dir: data/gestionale/archive
  monitoring: true
  polling_interval: 300

security:
  api_key: ${NORMALIZATION_API_KEY}
  enable_https: false
  cors_allowed_origins:
    - http://localhost:8080
    - https://gestionale.local

performance:
  batch_size: 100
  cache_enabled: true
  cache_ttl: 3600
  thread_pool: 4

monitoring:
  health_check_interval: 60
  metrics_enabled: true
  alert_on_error: true
