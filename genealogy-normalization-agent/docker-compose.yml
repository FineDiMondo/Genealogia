version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - src.daemon.monitor
      - --incoming
      - data/incoming
      - --normalized
      - data/normalized
      - --gest-pending
      - data/gestionale/pending
      - --gest-responses
      - data/gestionale/responses
      - --gest-archive
      - data/gestionale/archive
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-genealogy_norm}
      POSTGRES_USER: ${DB_USER:-genealogy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
