item4=Build|run:build
item5=Publish|run:publish
item6=Apri Portale|run:open_portale
item7=Audio: FLAC/WAV -> MIDI chiptune (FFT)|run:wav2midi
item8=Snapshot DB|session_snapshot
item9=Chiudi sessione|session_close
item10=Esci|exit
