[paths]
repo_root=..
runtime_dir=../runtime

[assets]
font=assets/DejaVuSansMono.ttf
font_size=18

[audio]
enabled=1
bits=16
rate=22050
channels=1
volume=0.25
crunch=1
crunch_levels=16
noise=0.02
jingle=1

[commands]
import_gedcom=cmd /c tools\\import_gedcom.cmd
validate=cmd /c tools\\validate.cmd
build=cmd /c tools\\build.cmd
publish=cmd /c tools\\publish.cmd
open_portale=cmd /c tools\\open_portale.cmd
wav2midi=cmd /c tools\\audio\\wav2midi.cmd

[menu]
item1=Apri sessione|session_open
item2=Import GEDCOM -> DB|run:import_gedcom
