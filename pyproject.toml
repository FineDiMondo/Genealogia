[tool.black]
target-version = ["py312"]
line-length = 100
skip-string-normalization = false

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]  # line length gestita da black

[tool.pytest.ini_options]
testpaths = ["scripts", "tests"]
python_files = ["*test*.py", "test_*.py"]
python_functions = ["test_*"]
