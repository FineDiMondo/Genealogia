<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GN370 Tests</title>
  <style>
    body { font-family: monospace; background: #000; color: #4cff4c; padding: 1rem; }
    .ok { color: #4cff4c; }
    .err { color: #ff6666; }
  </style>
</head>
<body>
  <h1>GN370 Test Runner</h1>
  <pre id="report">Running tests...</pre>

  <script src="../src/copybook/copybook_parser.js"></script>
  <script src="../src/copybook/record_parser.js"></script>
  <script src="../src/copybook/record_renderer_370.js"></script>
  <script src="../assets/gn370.js"></script>
  <script>
    const results = [];
    function assert(cond, msg) {
      if (!cond) throw new Error(msg || 'assert failed');
    }
    function test(name, fn) {
      try {
        fn();
        results.push({ name, ok: true });
      } catch (e) {
        results.push({ name, ok: false, err: e.message || String(e) });
      }
    }
    function report() {
      const out = document.getElementById('report');
      const lines = [];
      let fails = 0;
      results.forEach((r) => {
        if (r.ok) lines.push(`[PASS] ${r.name}`);
        else { lines.push(`[FAIL] ${r.name} -> ${r.err}`); fails += 1; }
      });
      lines.push('----------------------------------------');
      lines.push(`TOTAL ${results.length}  FAIL ${fails}`);
      out.textContent = lines.join('\n');
      out.className = fails ? 'err' : 'ok';
    }
    window.__GN370_TEST__ = { test, assert, report };
  </script>
  <script src="gn370_shell.test.js"></script>
  <script src="gedcom_parser.test.js"></script>
  <script src="copybook_parser.test.js"></script>
  <script src="record_parser.test.js"></script>
  <script src="progress_renderer.test.js"></script>
  <script>
    window.__GN370_TEST__.report();
  </script>
</body>
</html>
